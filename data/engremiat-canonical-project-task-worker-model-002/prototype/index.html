<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ENGREMIAT · Control humano canónico</title>
<style>
:root{font-family:Inter,Segoe UI,Arial,sans-serif;color:#edf3ff;background:#08111f}*{box-sizing:border-box}body{margin:0;background:linear-gradient(135deg,#08111f,#0d1830);min-height:100vh}.top{padding:18px 24px;border-bottom:1px solid #24334f;background:#0b1527cc;position:sticky;top:0;z-index:4}.top h1{margin:0;font-size:21px}.sub{color:#9db0ce;font-size:12px;margin-top:5px}.nav{display:flex;gap:8px;flex-wrap:wrap;margin-top:15px}.nav button,.filters select{background:#14233d;color:#dce8ff;border:1px solid #31476b;border-radius:8px;padding:8px 11px}.nav button.active{background:#285ba7}.wrap{padding:20px}.view{display:none}.view.active{display:block}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px}.card{background:#101d32;border:1px solid #263a5c;border-radius:12px;padding:14px;box-shadow:0 8px 25px #0003}.card h3{margin:0 0 8px}.muted{color:#96aac9;font-size:12px}.tag{display:inline-block;border:1px solid #3e5f8b;border-radius:999px;padding:3px 8px;font-size:11px;margin:2px}.p0,.critical{border-color:#e55252;color:#ff9c9c}.p1,.high{border-color:#e49c42;color:#ffc477}.p2,.medium{border-color:#d5c148;color:#f4df75}.healthy,.pass,.closed{border-color:#46ad76;color:#7ee0a2}.blocked,.open{border-color:#e55252;color:#ff9c9c}.board{display:grid;grid-template-columns:repeat(6,minmax(240px,1fr));gap:12px;overflow:auto;padding-bottom:12px}.column{background:#0c1729;border:1px solid #253957;border-radius:12px;padding:10px;min-height:280px}.column h3{position:sticky;top:0;background:#0c1729;margin:0 0 10px;padding:6px}.task{background:#14243d;border:1px solid #315078;border-radius:10px;padding:11px;margin-bottom:9px;cursor:pointer}.task:hover{border-color:#68a4ff}.filters{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:14px}.metric{font-size:26px;font-weight:700}.bar{height:7px;background:#253650;border-radius:6px;overflow:hidden;margin-top:8px}.bar i{display:block;height:100%;background:#5e9cff}.row{display:flex;justify-content:space-between;gap:12px;align-items:center}.detail{white-space:pre-wrap;font-family:Consolas,monospace;font-size:12px}.empty{color:#8094b3;padding:20px}.banner{background:#352c16;border:1px solid #806d2b;color:#f7da76;border-radius:10px;padding:10px;margin-bottom:15px}
</style>
</head>
<body>
<header class="top">
<h1>ENGREMIAT · Control humano canónico</h1>
<div class="sub" id="modelMeta"></div>
<nav class="nav">
<button data-view="portfolio" class="active">Proyectos</button>
<button data-view="work">Trabajo global</button>
<button data-view="kanban">Kanban</button>
<button data-view="workers">Workers</button>
<button data-view="decisions">Decisiones</button>
<button data-view="alerts">Alertas</button>
<button data-view="detail">Detalle</button>
</nav>
</header>
<main class="wrap">
<div class="banner">MODO SUPERVISIÓN · mover o consultar elementos no ejecuta tareas reales.</div>
<section id="portfolio" class="view active"><div id="portfolioGrid" class="grid"></div></section>
<section id="work" class="view"><div class="filters"><select id="projectFilter"></select><select id="statusFilter"></select><select id="workerFilter"></select></div><div id="workGrid" class="grid"></div></section>
<section id="kanban" class="view"><div id="kanbanBoard" class="board"></div></section>
<section id="workers" class="view"><div id="workerGrid" class="grid"></div></section>
<section id="decisions" class="view"><div id="gateGrid" class="grid"></div></section>
<section id="alerts" class="view"><div id="alertGrid" class="grid"></div></section>
<section id="detail" class="view"><div id="detailCard" class="card"><div class="empty">Selecciona una tarea.</div></div></section>
</main>
<script src="canonical-model.data.js"></script>
<script>
const M=window.ENGREMIAT_CANONICAL_MODEL;
const by=(arr,key,val)=>arr.find(x=>x[key]===val);
const esc=v=>String(v??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const assignmentsFor=id=>M.worker_assignments.filter(x=>x.task_id===id);
const workerName=id=>by(M.workers,'worker_id',id)?.display_name||id||'—';
const projectName=id=>by(M.projects,'project_id',id)?.name||id;
const cls=v=>String(v||'').toLowerCase().replaceAll('_','-');
document.getElementById('modelMeta').textContent=`${M.model_id} · ${M.projects.length} proyectos · ${M.tasks.length} tareas · ${M.workers.length} workers`;
document.querySelectorAll('.nav button').forEach(b=>b.onclick=()=>{document.querySelectorAll('.nav button').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));b.classList.add('active');document.getElementById(b.dataset.view).classList.add('active')});
function renderPortfolio(){
 portfolioGrid.innerHTML=M.projects.map(p=>{const tasks=M.tasks.filter(t=>t.project_id===p.project_id);const open=tasks.filter(t=>!['CLOSED','CANCELLED'].includes(t.status)).length;return `<article class="card"><div class="row"><h3>${esc(p.name)}</h3><span class="tag ${cls(p.priority)}">${p.priority}</span></div><div class="muted">${esc(p.summary)}</div><p><span class="tag ${cls(p.health)}">${p.health}</span><span class="tag">${p.status}</span><span class="tag">${p.risk}</span></p><div class="metric">${p.progress}%</div><div class="bar"><i style="width:${p.progress}%"></i></div><p class="muted">${tasks.length} tareas · ${open} abiertas · responsable ${esc(workerName(p.owner_worker_id))}</p></article>`}).join('');
}
function taskCard(t){const assigns=assignmentsFor(t.task_id);const accountable=assigns.find(a=>a.role==='ACCOUNTABLE');return `<article class="task" data-task="${esc(t.task_id)}"><div class="row"><strong>${esc(t.title)}</strong><span class="tag ${cls(t.priority_global)}">${t.priority_global}</span></div><div class="muted">${esc(projectName(t.project_id))}</div><p><span class="tag ${cls(t.status)}">${t.status}</span><span class="tag ${cls(t.risk)}">${t.risk}</span></p><div class="muted">Prioridad ${t.priority_score} · ${esc(workerName(accountable?.worker_id))}</div></article>`}
function bindTaskClicks(){document.querySelectorAll('[data-task]').forEach(e=>e.onclick=()=>showTask(e.dataset.task))}
function renderWork(){
 const p=projectFilter.value,s=statusFilter.value,w=workerFilter.value;
 const rows=[...M.tasks].filter(t=>(!p||t.project_id===p)&&(!s||t.status===s)&&(!w||assignmentsFor(t.task_id).some(a=>a.worker_id===w))).sort((a,b)=>Number(a.priority_global.slice(1))-Number(b.priority_global.slice(1))||b.priority_score-a.priority_score);
 workGrid.innerHTML=rows.map(taskCard).join('')||'<div class="empty">Sin tareas para estos filtros.</div>';bindTaskClicks();
}
function renderKanban(){
 const states=['BACKLOG','READY','IN_PROGRESS','BLOCKED','HUMAN_REVIEW','VERIFIED'];
 kanbanBoard.innerHTML=states.map(s=>`<div class="column"><h3>${s} · ${M.tasks.filter(t=>t.status===s).length}</h3>${M.tasks.filter(t=>t.status===s).sort((a,b)=>b.priority_score-a.priority_score).map(taskCard).join('')}</div>`).join('');bindTaskClicks();
}
function renderWorkers(){
 workerGrid.innerHTML=M.workers.map(w=>{const assigned=M.worker_assignments.filter(a=>a.worker_id===w.worker_id&&['ACTIVE','PENDING'].includes(a.status));return `<article class="card"><div class="row"><h3>${esc(w.display_name)}</h3><span class="tag">${w.worker_type}</span></div><p><span class="tag ${cls(w.status)}">${w.status}</span><span class="tag">${w.load}</span></p><div class="metric">${assigned.length}</div><div class="muted">asignaciones abiertas · cola ${w.queue_size}</div>${assigned.map(a=>`<p class="muted">${a.role}: ${esc(by(M.tasks,'task_id',a.task_id)?.title)}</p>`).join('')}</article>`}).join('');
}
function renderGates(){
 gateGrid.innerHTML=M.gates.map(g=>`<article class="card"><div class="row"><h3>${g.gate_type}</h3><span class="tag ${cls(g.authorization)}">${g.authorization}</span></div><p>${esc(by(M.tasks,'task_id',g.task_id)?.title)}</p><div class="muted">${esc(projectName(g.project_id))} · riesgo ${g.risk}</div><p>${esc(g.decision_reason||'Pendiente de decisión humana')}</p></article>`).join('');
}
function renderAlerts(){
 alertGrid.innerHTML=M.alerts.map(a=>`<article class="card"><div class="row"><h3>${a.alert_type}</h3><span class="tag ${cls(a.severity)}">${a.severity}</span></div><p>${esc(a.message)}</p><div class="muted">${esc(projectName(a.project_id))}</div><p>${esc(a.recommended_action)}</p></article>`).join('');
}
function showTask(id){
 const t=by(M.tasks,'task_id',id),as=assignmentsFor(id),deps=M.dependencies.filter(d=>d.source_id===id||d.target_id===id),gates=M.gates.filter(g=>g.task_id===id),ev=M.evidences.filter(e=>e.task_id===id);
 detailCard.innerHTML=`<h2>${esc(t.title)}</h2><p>${esc(t.summary)}</p><p><span class="tag ${cls(t.status)}">${t.status}</span><span class="tag ${cls(t.priority_global)}">${t.priority_global}</span><span class="tag">${t.risk}</span></p><h3>Contexto</h3><div class="detail">Proyecto: ${esc(projectName(t.project_id))}\nObjetivo: ${esc(by(M.objectives,'objective_id',t.objective_id)?.title)}\nEtapa: ${esc(by(M.stages,'stage_id',t.stage_id)?.title)}\nSiguiente acción: ${esc(t.next_action)}\nValidación: ${t.validation_state}\nEvidencia: ${t.evidence_state}</div><h3>Workers</h3>${as.map(a=>`<p>${a.role}: <strong>${esc(workerName(a.worker_id))}</strong> · ${a.status}</p>`).join('')}<h3>Dependencias</h3>${deps.length?deps.map(d=>`<p>${d.dependency_type}: ${esc(d.source_id)} → ${esc(d.target_id)} · ${d.status}</p>`).join(''):'<p class="muted">Sin dependencias.</p>'}<h3>Gates y evidencias</h3><p>${gates.length} gates · ${ev.length} evidencias</p>`;
 document.querySelectorAll('.nav button').forEach(x=>x.classList.toggle('active',x.dataset.view==='detail'));document.querySelectorAll('.view').forEach(x=>x.classList.toggle('active',x.id==='detail'));
}
projectFilter.innerHTML='<option value="">Todos los proyectos</option>'+M.projects.map(p=>`<option value="${p.project_id}">${esc(p.name)}</option>`).join('');
statusFilter.innerHTML='<option value="">Todos los estados</option>'+[...new Set(M.tasks.map(t=>t.status))].map(s=>`<option>${s}</option>`).join('');
workerFilter.innerHTML='<option value="">Todos los workers</option>'+M.workers.map(w=>`<option value="${w.worker_id}">${esc(w.display_name)}</option>`).join('');
[projectFilter,statusFilter,workerFilter].forEach(x=>x.onchange=renderWork);
renderPortfolio();renderWork();renderKanban();renderWorkers();renderGates();renderAlerts();
</script>
</body>
</html>
